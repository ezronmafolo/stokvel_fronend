<div class="container mt-4">
  <h2 class="mb-4">Account Statement</h2>
  <h3>User ID: {{ userId }}</h3>
  <h3>Name: {{ user[0] }}</h3>
  <h3>Surname: {{ user[1] }}</h3>
  
  <div class="table-responsive">
    <table class="table table-striped table-bordered">
      <thead class="table-dark">
        <tr>
          <th>Transaction ID</th>
          <th>Date</th>
          <th>Description</th>
          <th>Debit</th>
          <th>Credit</th>
          <th>Balance</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tx of transactions">
          <td>{{ tx.id }}</td>
          <td>{{ tx.date }}</td>
          <td>{{ tx.description }}</td>
          <td class="text-danger">{{ tx.debit | currency:'R' }}</td>
          <td class="text-success">{{ tx.credit | currency:'R' }}</td>
          <td>{{ tx.balance | currency:'R' }}</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
