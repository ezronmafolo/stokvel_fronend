<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 450px;">
    <h3 class="text-center mb-4">Register User</h3>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <!-- User ID -->
      <div class="mb-3">
        <label for="UserID" class="form-label">User ID</label>
        <input
          type="text"
          id="UserID"
          class="form-control"
          name="UserID"
          [(ngModel)]="UserID"
          required
        />
      </div>

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input
          type="text"
          id="name"
          class="form-control"
          name="name"
          [(ngModel)]="name"
          required
        />
      </div>

       <!-- Surname -->
      <div class="mb-3">
        <label for="Surname" class="form-label">Surname</label>
        <input
          type="text"
          id="Surname"
          class="form-control"
          name="Surname"
          [(ngModel)]="Surname"
          required
        />
      </div>

       <!-- Cellphone -->
      <div class="mb-3">
        <label for="Cellphone" class="form-label">Cellphone</label>
        <input
          type="text"
          id="Cellphone"
          class="form-control"
          name="Cellphone"
          [(ngModel)]="Cellphone"
          required
        />
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          id="email"
          class="form-control"
          name="email"
          [(ngModel)]="email"
          required
        />
      </div>

      <!-- User Type Dropdown -->
      <div class="mb-3">
        <label for="userType" class="form-label">User Type</label>
        <select
          type="text"
          id="userType"
          class="form-select"
          name="userType"
          [(ngModel)]="userTypes"
          required
        >
          <option value="Select a type" disabled selected>Select a type</option>
          <option *ngFor="let type of userTypes" [value]="type">{{ type }}</option>
        </select>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100" [disabled]="!registerForm.valid">
        Register
      </button>
    </form>

  </div>
</div>
